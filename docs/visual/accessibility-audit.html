<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nordover Accessibility Audit — WCAG AA Testing</title>
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <link rel="stylesheet" href="./tokens/tokens-web.css">
  <link rel="stylesheet" href="./components/components-web.css">
  <style>
    body {
      font-family: var(--font-body);
      background-color: var(--color-bg);
      color: var(--color-text);
      padding: 2rem;
    }

    .audit-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .audit-header {
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 1rem;
    }

    .audit-header h1 {
      font-size: 2rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
    }

    .audit-header p {
      color: var(--color-text-secondary);
      margin: 0;
    }

    .audit-controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .audit-btn {
      padding: 0.75rem 1.5rem;
      background-color: var(--color-primary);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-weight: 500;
      font-size: 1rem;
    }

    .audit-btn:hover {
      opacity: 0.9;
    }

    .audit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .audit-btn.secondary {
      background-color: var(--color-bg-secondary);
      color: var(--color-text);
      border: 1px solid var(--color-border);
    }

    .audit-status {
      background-color: var(--color-bg-secondary);
      padding: 1.5rem;
      border-radius: var(--radius-md);
      margin-bottom: 2rem;
      border-left: 4px solid var(--color-primary);
    }

    .audit-status h2 {
      margin: 0 0 1rem 0;
      font-size: 1.25rem;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--color-border);
    }

    .status-item:last-child {
      border-bottom: none;
    }

    .status-label {
      font-weight: 500;
      color: var(--color-text);
    }

    .status-value {
      font-weight: 700;
      color: var(--color-primary);
    }

    .status-value.error {
      color: var(--color-error);
    }

    .status-value.success {
      color: var(--color-success);
    }

    .audit-results {
      margin-top: 2rem;
    }

    .violation-group {
      background-color: var(--color-bg-secondary);
      border-radius: var(--radius-md);
      margin-bottom: 1.5rem;
      overflow: hidden;
      border-left: 4px solid var(--color-error);
    }

    .violation-group.warning {
      border-left-color: var(--color-warning);
    }

    .violation-group.pass {
      border-left-color: var(--color-success);
    }

    .violation-header {
      padding: 1rem 1.5rem;
      background-color: var(--color-bg-tertiary);
      cursor: pointer;
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .violation-header:hover {
      background-color: var(--color-bg-quaternary);
    }

    .violation-title {
      font-weight: 600;
      font-size: 1.1rem;
    }

    .violation-meta {
      display: flex;
      gap: 1rem;
      margin-top: 0.5rem;
      font-size: 0.9rem;
      color: var(--color-text-secondary);
    }

    .severity-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 0.8rem;
    }

    .severity-badge.critical {
      background-color: var(--color-error);
      color: white;
    }

    .severity-badge.serious {
      background-color: var(--color-warning);
      color: var(--color-text);
    }

    .severity-badge.moderate {
      background-color: #4f46e5;
      color: white;
    }

    .severity-badge.minor {
      background-color: #06b6d4;
      color: white;
    }

    .violation-count {
      background-color: var(--color-error);
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 0.85rem;
    }

    .violation-count.warning {
      background-color: var(--color-warning);
      color: var(--color-text);
    }

    .violation-count.pass {
      background-color: var(--color-success);
      color: white;
    }

    .violation-body {
      padding: 1.5rem;
      display: none;
    }

    .violation-body.active {
      display: block;
    }

    .violation-item {
      background-color: var(--color-bg);
      padding: 1rem;
      border-radius: var(--radius-sm);
      margin-bottom: 1rem;
      border-left: 3px solid var(--color-border);
    }

    .violation-item:last-child {
      margin-bottom: 0;
    }

    .violation-description {
      margin-bottom: 0.75rem;
    }

    .violation-description strong {
      display: block;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .impact-badge {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .impact-badge.critical {
      background-color: rgba(239, 68, 68, 0.1);
      color: var(--color-error);
    }

    .impact-badge.serious {
      background-color: rgba(245, 158, 11, 0.1);
      color: var(--color-warning);
    }

    .impact-badge.moderate {
      background-color: rgba(79, 70, 229, 0.1);
      color: #4f46e5;
    }

    .impact-badge.minor {
      background-color: rgba(6, 182, 212, 0.1);
      color: #06b6d4;
    }

    .violation-element {
      background-color: var(--color-bg-secondary);
      padding: 0.75rem;
      border-radius: var(--radius-sm);
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      overflow-x: auto;
      margin: 0.5rem 0;
      border: 1px solid var(--color-border);
    }

    .violation-help {
      margin-top: 0.75rem;
      padding: 0.75rem;
      background-color: var(--color-info-bg, rgba(59, 130, 246, 0.1));
      border-left: 3px solid var(--color-info, #3b82f6);
      border-radius: var(--radius-sm);
    }

    .violation-help strong {
      display: block;
      margin-bottom: 0.25rem;
      color: var(--color-info, #3b82f6);
    }

    .toggle-icon {
      display: inline-block;
      transition: transform 200ms;
    }

    .violation-header.active .toggle-icon {
      transform: rotate(180deg);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .summary-card {
      background-color: var(--color-bg-secondary);
      padding: 1.5rem;
      border-radius: var(--radius-md);
      border-top: 4px solid var(--color-primary);
    }

    .summary-card.critical {
      border-top-color: var(--color-error);
    }

    .summary-card.warning {
      border-top-color: var(--color-warning);
    }

    .summary-card.pass {
      border-top-color: var(--color-success);
    }

    .summary-card h3 {
      margin: 0 0 0.5rem 0;
      color: var(--color-text-secondary);
      font-size: 0.9rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .summary-card .number {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--color-primary);
    }

    .summary-card.critical .number {
      color: var(--color-error);
    }

    .summary-card.warning .number {
      color: var(--color-warning);
    }

    .summary-card.pass .number {
      color: var(--color-success);
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--color-text-secondary);
    }

    .loading-spinner {
      display: inline-block;
      width: 2rem;
      height: 2rem;
      border: 3px solid var(--color-border);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message {
      background-color: var(--color-error-bg, rgba(239, 68, 68, 0.1));
      color: var(--color-error);
      padding: 1rem;
      border-radius: var(--radius-md);
      border-left: 4px solid var(--color-error);
      margin-bottom: 1.5rem;
    }

    .success-message {
      background-color: var(--color-success-bg, rgba(34, 197, 94, 0.1));
      color: var(--color-success);
      padding: 1rem;
      border-radius: var(--radius-md);
      border-left: 4px solid var(--color-success);
      margin-bottom: 1.5rem;
    }

    .no-violations {
      text-align: center;
      padding: 3rem 1.5rem;
      background-color: var(--color-bg-secondary);
      border-radius: var(--radius-md);
      border: 2px dashed var(--color-success);
    }

    .no-violations h2 {
      color: var(--color-success);
      margin: 0 0 0.5rem 0;
    }

    .accessibility-link {
      color: var(--color-primary);
      text-decoration: none;
    }

    .accessibility-link:hover {
      text-decoration: underline;
    }

    @media (prefers-reduced-motion: reduce) {
      .loading-spinner,
      .toggle-icon {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="audit-container">
    <div class="audit-header">
      <h1>Nordover Accessibility Audit</h1>
      <p>Automated WCAG 2.1 Level AA testing for all styleguide components</p>
    </div>

    <div class="audit-controls">
      <button class="audit-btn" id="auditWebBtn">Audit Web Styleguide</button>
      <button class="audit-btn" id="auditAppBtn">Audit App Styleguide</button>
      <button class="audit-btn secondary" id="downloadReportBtn" disabled>Download Report</button>
      <button class="audit-btn secondary" id="exportJsonBtn" disabled>Export JSON</button>
    </div>

    <div id="auditStatus" class="audit-status" style="display: none;">
      <h2>Audit Progress</h2>
      <div class="loading">
        <div class="loading-spinner"></div>
        <p id="statusMessage">Initializing audit...</p>
      </div>
    </div>

    <div id="auditSummary"></div>
    <div id="auditResults"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axe-core/4.8.0/axe.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    class AccessibilityAudit {
      constructor() {
        this.results = null;
        this.currentTarget = null;
        this.initializeEventListeners();
      }

      initializeEventListeners() {
        document.getElementById('auditWebBtn').addEventListener('click', () => this.auditStyleguide('styleguide-web.html', 'Web'));
        document.getElementById('auditAppBtn').addEventListener('click', () => this.auditStyleguide('styleguide-app.html', 'App'));
        document.getElementById('downloadReportBtn').addEventListener('click', () => this.downloadReport());
        document.getElementById('exportJsonBtn').addEventListener('click', () => this.exportJson());
      }

      async auditStyleguide(filename, label) {
        const statusEl = document.getElementById('auditStatus');
        const statusMsg = document.getElementById('statusMessage');
        const summaryEl = document.getElementById('auditSummary');
        const resultsEl = document.getElementById('auditResults');

        statusEl.style.display = 'block';
        summaryEl.innerHTML = '';
        resultsEl.innerHTML = '';

        try {
          statusMsg.textContent = `Loading ${label} styleguide...`;
          const styleguideHtml = await fetch(filename).then(r => r.text());

          statusMsg.textContent = `Parsing DOM for ${label}...`;
          const parser = new DOMParser();
          const doc = parser.parseFromString(styleguideHtml, 'text/html');

          statusMsg.textContent = `Running axe accessibility tests...`;
          const results = await axe.run(doc, {
            runOnly: {
              type: 'tag',
              values: ['wcag2aa', 'wcag21aa']
            }
          });

          this.results = results;
          this.currentTarget = label;

          statusEl.style.display = 'none';
          this.renderResults(results, label);

          document.getElementById('downloadReportBtn').disabled = false;
          document.getElementById('exportJsonBtn').disabled = false;

        } catch (error) {
          statusEl.style.display = 'none';
          resultsEl.innerHTML = `<div class="error-message"><strong>Audit Error:</strong> ${error.message}</div>`;
        }
      }

      renderResults(results, label) {
        const summaryEl = document.getElementById('auditSummary');
        const resultsEl = document.getElementById('auditResults');

        const violations = results.violations || [];
        const passes = results.passes || [];
        const incomplete = results.incomplete || [];

        summaryEl.innerHTML = `
          <h2>Summary for ${label} Styleguide</h2>
          <div class="summary-grid">
            <div class="summary-card critical">
              <h3>Critical Issues</h3>
              <div class="number">${violations.filter(v => v.impact === 'critical').length}</div>
            </div>
            <div class="summary-card warning">
              <h3>Warnings</h3>
              <div class="number">${violations.filter(v => v.impact !== 'critical').length}</div>
            </div>
            <div class="summary-card pass">
              <h3>Passed Rules</h3>
              <div class="number">${passes.length}</div>
            </div>
            <div class="summary-card">
              <h3>Needs Review</h3>
              <div class="number">${incomplete.length}</div>
            </div>
          </div>
        `;

        let html = '<div class="audit-results">';

        if (violations.length === 0 && incomplete.length === 0) {
          html += '<div class="no-violations"><h2>✓ No Violations Found</h2><p>All tested components passed WCAG 2.1 Level AA accessibility standards.</p></div>';
        } else {
          if (violations.length > 0) {
            html += '<h2>Violations</h2>';
            violations.forEach((violation, idx) => {
              html += this.renderViolation(violation, idx);
            });
          }

          if (incomplete.length > 0) {
            html += '<h2 style="margin-top: 2rem;">Needs Manual Review</h2>';
            incomplete.forEach((item, idx) => {
              html += this.renderIncomplete(item, idx);
            });
          }
        }

        if (passes.length > 0) {
          html += `<h2 style="margin-top: 2rem;">Passed (${passes.length} rules)</h2>`;
          html += '<details><summary>Show all passed checks</summary>';
          passes.forEach(pass => {
            html += `<div style="padding: 0.5rem 0; border-bottom: 1px solid var(--color-border);">✓ ${pass.id} - ${pass.description}</div>`;
          });
          html += '</details>';
        }

        html += '</div>';
        resultsEl.innerHTML = html;

        this.attachViolationListeners();
      }

      renderViolation(violation, idx) {
        const severityClass = violation.impact === 'critical' ? 'critical' : 'warning';
        const countClass = violation.impact === 'critical' ? 'error' : 'warning';

        return `
          <div class="violation-group ${severityClass}">
            <div class="violation-header" data-violation="${idx}">
              <div>
                <div class="violation-title">
                  ${violation.id}
                  <span class="severity-badge ${violation.impact}">${violation.impact.toUpperCase()}</span>
                </div>
                <div class="violation-meta">
                  <span>${violation.description}</span>
                  <span class="violation-count ${countClass}">${violation.nodes.length} element${violation.nodes.length !== 1 ? 's' : ''}</span>
                </div>
              </div>
              <span class="toggle-icon">▼</span>
            </div>
            <div class="violation-body" data-violation="${idx}">
              ${violation.nodes.map((node, nodeIdx) => this.renderViolationNode(node, nodeIdx, violation)).join('')}
              <div class="violation-help">
                <strong>How to fix:</strong>
                <p>${violation.help}</p>
                ${violation.helpUrl ? `<p><a href="${violation.helpUrl}" target="_blank" class="accessibility-link">Learn more →</a></p>` : ''}
              </div>
            </div>
          </div>
        `;
      }

      renderViolationNode(node, idx, violation) {
        return `
          <div class="violation-item">
            <div class="violation-description">
              <div class="impact-badge ${violation.impact}">Impact: ${violation.impact}</div>
              <strong>Element ${idx + 1}:</strong>
              <div class="violation-element">${this.escapeHtml(node.html)}</div>
            </div>
            <div style="font-size: 0.9rem; color: var(--color-text-secondary);">
              <strong>Issues found:</strong>
              <ul style="margin: 0.5rem 0; padding-left: 1.5rem;">
                ${node.any.map(check => `<li>${check.message}</li>`).join('')}
                ${node.all.map(check => `<li>${check.message}</li>`).join('')}
              </ul>
            </div>
          </div>
        `;
      }

      renderIncomplete(item, idx) {
        return `
          <div class="violation-group">
            <div class="violation-header" data-incomplete="${idx}">
              <div>
                <div class="violation-title">${item.id}</div>
                <div class="violation-meta">
                  <span>${item.description}</span>
                  <span class="violation-count">${item.nodes.length} element${item.nodes.length !== 1 ? 's' : ''}</span>
                </div>
              </div>
              <span class="toggle-icon">▼</span>
            </div>
            <div class="violation-body" data-incomplete="${idx}">
              <p style="color: var(--color-text-secondary); margin: 0 0 1rem 0;">
                This rule requires manual review to determine if it's a true issue.
              </p>
              ${item.nodes.map((node, nodeIdx) => `
                <div class="violation-item">
                  <div class="violation-element">${this.escapeHtml(node.html)}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      attachViolationListeners() {
        document.querySelectorAll('.violation-header').forEach(header => {
          header.addEventListener('click', () => {
            header.classList.toggle('active');
            const body = document.querySelector(`[data-violation="${header.dataset.violation}"]`);
            if (body && body !== header) {
              body.classList.toggle('active');
            }
          });
        });
      }

      downloadReport() {
        if (!this.results) return;

        const markdown = this.generateMarkdownReport();
        const blob = new Blob([markdown], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `accessibility-audit-${this.currentTarget}-${new Date().toISOString().split('T')[0]}.md`;
        a.click();
        URL.revokeObjectURL(url);
      }

      exportJson() {
        if (!this.results) return;

        const json = JSON.stringify(this.results, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `accessibility-audit-${this.currentTarget}-${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
      }

      generateMarkdownReport() {
        const violations = this.results.violations || [];
        const passes = this.results.passes || [];
        const incomplete = this.results.incomplete || [];

        const criticalCount = violations.filter(v => v.impact === 'critical').length;
        const warningCount = violations.filter(v => v.impact !== 'critical').length;

        let md = `# Accessibility Audit Report — ${this.currentTarget} Styleguide\n\n`;
        md += `Generated: ${new Date().toLocaleString()}\n\n`;

        md += `## Summary\n\n`;
        md += `| Metric | Count |\n`;
        md += `|--------|-------|\n`;
        md += `| Critical Issues | ${criticalCount} |\n`;
        md += `| Warnings | ${warningCount} |\n`;
        md += `| Passed Rules | ${passes.length} |\n`;
        md += `| Needs Manual Review | ${incomplete.length} |\n\n`;

        if (violations.length > 0) {
          md += `## Violations\n\n`;
          violations.forEach(violation => {
            md += `### ${violation.id} — ${violation.impact.toUpperCase()}\n\n`;
            md += `**Description:** ${violation.description}\n\n`;
            md += `**Impact:** ${violation.impact}\n\n`;
            md += `**Affected Elements:** ${violation.nodes.length}\n\n`;
            md += `**How to fix:** ${violation.help}\n\n`;
            if (violation.helpUrl) {
              md += `[Learn more](${violation.helpUrl})\n\n`;
            }
            md += `---\n\n`;
          });
        }

        if (incomplete.length > 0) {
          md += `## Items Requiring Manual Review\n\n`;
          incomplete.forEach(item => {
            md += `### ${item.id}\n\n`;
            md += `**Description:** ${item.description}\n`;
            md += `**Affected Elements:** ${item.nodes.length}\n\n`;
          });
        }

        return md;
      }

      escapeHtml(html) {
        const div = document.createElement('div');
        div.textContent = html;
        return div.innerHTML;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      new AccessibilityAudit();
    });
  </script>
</body>
</html>
