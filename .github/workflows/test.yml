name: Nordover Quality Tests

on: 
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  validation:
    name: CSS & HTML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
      - name: Validate files
        run: |
          echo "✓ Testing framework ready"
          echo "Manual tests documented in TESTING.md"

  tokens:
    name: Design Tokens (DTCG JSON in sync with CSS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Verify token JSON matches CSS source
        run: python3 scripts/build_tokens.py --check
      - name: Verify token names consistent across web/app
        run: python3 scripts/validate-token-consistency.py
      - name: Verify semantic colour pairs meet WCAG AA (light + dark)
        run: python3 scripts/check_contrast.py --strict
